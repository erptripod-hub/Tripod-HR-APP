<div id="ess-guidelines-root"></div>

<style>
#ess-guidelines-root * { box-sizing: border-box; }
#ess-guidelines-root {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
	background: #f0f2f5;
	min-height: 100vh;
	padding: 24px;
}
.ess-topbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	margin-bottom: 20px;
}
.ess-page-title {
	font-size: 20px;
	font-weight: 700;
	color: #1a1a2e;
}
.ess-tabs {
	display: flex;
	gap: 4px;
	background: #fff;
	border: 1px solid #e5e7eb;
	border-radius: 8px;
	padding: 4px;
	margin-bottom: 20px;
}
.ess-tab {
	padding: 8px 20px;
	font-size: 13px;
	font-weight: 500;
	color: #6b7280;
	border-radius: 6px;
	cursor: pointer;
	border: none;
	background: transparent;
	transition: all .15s;
}
.ess-tab.active {
	background: #3b5bdb;
	color: #fff;
}
.ess-tab:hover:not(.active) { background: #f5f7ff; color: #3b5bdb; }

/* Section label */
.ess-section-hd {
	display: flex;
	align-items: center;
	gap: 10px;
	margin: 0 0 14px;
}
.ess-section-label {
	font-size: 10.5px;
	font-weight: 700;
	color: #9ca3af;
	letter-spacing: .7px;
	text-transform: uppercase;
}
.ess-section-line { flex: 1; height: 1px; background: #e5e7eb; }

/* Panel */
.ess-panel {
	background: #fff;
	border: 1px solid #e5e7eb;
	border-radius: 10px;
	margin-bottom: 16px;
	overflow: hidden;
}
.ess-panel-hd {
	padding: 13px 18px;
	border-bottom: 1px solid #f3f4f6;
	display: flex;
	align-items: center;
	justify-content: space-between;
}
.ess-panel-title {
	font-size: 13px;
	font-weight: 600;
	color: #1a1a2e;
	display: flex;
	align-items: center;
	gap: 7px;
}

/* File rows */
.ess-file-row {
	display: flex;
	align-items: center;
	padding: 12px 18px;
	border-bottom: 1px solid #f9fafb;
	transition: background .1s;
}
.ess-file-row:last-of-type { border-bottom: none; }
.ess-file-row:hover { background: #f9fafb; }
.ess-file-icon {
	width: 34px;
	height: 38px;
	border-radius: 6px;
	background: #e8f5e9;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 10px;
	font-weight: 700;
	color: #2e7d32;
	margin-right: 14px;
	flex-shrink: 0;
}
.ess-file-icon.pdf { background: #fef2f2; color: #991b1b; }
.ess-file-icon.doc { background: #eff6ff; color: #1d4ed8; }
.ess-file-main { flex: 1; }
.ess-file-name { font-size: 13px; font-weight: 500; color: #1a1a2e; }
.ess-file-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.ess-view-btn {
	padding: 6px 16px;
	font-size: 12px;
	font-weight: 500;
	border: 1px solid #d0d5dd;
	border-radius: 6px;
	background: #fff;
	color: #374151;
	cursor: pointer;
	transition: all .12s;
	text-decoration: none;
}
.ess-view-btn:hover { background: #eff6ff; border-color: #3b5bdb; color: #3b5bdb; }
.ess-lock-note {
	display: flex;
	align-items: center;
	gap: 6px;
	font-size: 11px;
	color: #9ca3af;
	padding: 10px 18px;
	background: #fafbfc;
	border-top: 1px solid #f3f4f6;
}

/* In-page file viewer */
.ess-viewer {
	background: #fff;
	border: 1px solid #e5e7eb;
	border-radius: 10px;
	margin: 12px 0 16px;
	overflow: hidden;
}
.ess-viewer-hd {
	padding: 12px 18px;
	border-bottom: 1px solid #f3f4f6;
	display: flex;
	align-items: center;
	justify-content: space-between;
	background: #fafbfc;
}
.ess-viewer-title { font-size: 13px; font-weight: 600; color: #1a1a2e; }
.ess-viewer-body { padding: 0; }
.ess-viewer-body iframe {
	width: 100%;
	height: 520px;
	border: none;
	display: block;
	pointer-events: auto;
}
.ess-readonly-badge {
	display: inline-flex;
	align-items: center;
	gap: 5px;
	font-size: 11px;
	font-weight: 500;
	padding: 4px 10px;
	border-radius: 20px;
	background: #fffbeb;
	color: #92400e;
	border: 1px solid #fde68a;
}
.ess-close-btn {
	padding: 5px 12px;
	font-size: 12px;
	border: 1px solid #d0d5dd;
	border-radius: 5px;
	background: #fff;
	color: #374151;
	cursor: pointer;
}
.ess-close-btn:hover { background: #f9fafb; }

/* Policy cards */
.ess-search-bar {
	display: flex;
	gap: 8px;
	margin-bottom: 16px;
}
.ess-search-input {
	flex: 1;
	padding: 8px 14px;
	font-size: 13px;
	border: 1px solid #e5e7eb;
	border-radius: 6px;
	outline: none;
	color: #1a1a2e;
	background: #fff;
}
.ess-search-input:focus { border-color: #3b5bdb; }
.ess-dept-select {
	padding: 8px 12px;
	font-size: 13px;
	border: 1px solid #e5e7eb;
	border-radius: 6px;
	outline: none;
	background: #fff;
	color: #374151;
	min-width: 160px;
}
.ess-dept-section { padding: 14px 18px; border-bottom: 1px solid #f3f4f6; }
.ess-dept-section:last-child { border-bottom: none; }
.ess-dept-label {
	font-size: 10px;
	font-weight: 700;
	color: #9ca3af;
	letter-spacing: .7px;
	text-transform: uppercase;
	margin-bottom: 10px;
}
.ess-policy-grid {
	display: grid;
	grid-template-columns: repeat(3, minmax(0, 1fr));
	gap: 8px;
}
.ess-policy-card {
	border: 1px solid #e5e7eb;
	border-radius: 8px;
	padding: 12px 14px;
	cursor: pointer;
	transition: all .12s;
	background: #fff;
}
.ess-policy-card:hover { border-color: #3b5bdb; background: #f5f7ff; }
.ess-policy-name { font-size: 12.5px; font-weight: 500; color: #1a1a2e; margin-bottom: 5px; }
.ess-policy-meta { font-size: 11px; color: #9ca3af; }
.ess-badge {
	display: inline-flex;
	align-items: center;
	font-size: 10px;
	font-weight: 500;
	padding: 2px 8px;
	border-radius: 20px;
}
.ess-badge-green { background: #f0fdf4; color: #166534; }
.ess-badge-amber { background: #fffbeb; color: #92400e; }
.ess-badge-blue  { background: #eff6ff; color: #1d4ed8; }
.ess-badge-gray  { background: #f3f4f6; color: #374151; }

/* Policy detail viewer */
.ess-policy-viewer {
	background: #fff;
	border: 1px solid #e5e7eb;
	border-radius: 10px;
	margin: 0 0 16px;
	overflow: hidden;
}
.ess-policy-viewer-hd {
	padding: 13px 18px;
	border-bottom: 1px solid #f3f4f6;
	display: flex;
	align-items: center;
	justify-content: space-between;
	background: #fafbfc;
}
.ess-policy-viewer-body {
	padding: 20px 24px;
	font-size: 13px;
	line-height: 1.8;
	color: #374151;
}
.ess-policy-viewer-body h4 {
	font-size: 13px;
	font-weight: 600;
	color: #1a1a2e;
	margin: 14px 0 4px;
}
.ess-policy-viewer-body p { margin-bottom: 8px; }

/* Loading */
.ess-loading {
	text-align: center;
	padding: 40px;
	color: #9ca3af;
	font-size: 13px;
}
.ess-empty {
	text-align: center;
	padding: 32px;
	color: #9ca3af;
	font-size: 13px;
}
</style>

<script>
frappe.pages['ess-guidelines'].on_page_load = function(wrapper) {
	var page = frappe.ui.make_app_page({
		parent: wrapper,
		title: 'ESS Guidelines & Policies',
		single_column: true
	});

	// Prevent right-click and keyboard save on the whole page
	document.addEventListener('contextmenu', function(e) {
		if (e.target.closest('#ess-guidelines-root')) e.preventDefault();
	});
	document.addEventListener('keydown', function(e) {
		if ((e.ctrlKey || e.metaKey) && ['s','p'].includes(e.key.toLowerCase())) {
			e.preventDefault();
		}
	});

	$(page.body).html($('#ess-guidelines-root').parent().html());
	new ESSGuidelinesPage(page);
}

class ESSGuidelinesPage {
	constructor(page) {
		this.page = page;
		this.guidelines = [];
		this.policies = [];
		this.activeTab = 'guidelines';
		this.openViewer = null;
		this.openPolicy = null;
		this.render();
		this.load_data();
	}

	render() {
		const root = document.getElementById('ess-guidelines-root');
		root.innerHTML = `
			<div class="ess-topbar">
				<div class="ess-page-title">ESS Guidelines &amp; Policies</div>
				<span class="ess-readonly-badge">
					<svg width="12" height="12" viewBox="0 0 12 12" fill="none">
						<rect x="2" y="5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
						<path d="M4 5V3.5a2 2 0 014 0V5" stroke="currentColor" stroke-width="1.2"/>
					</svg>
					Read-only · No download
				</span>
			</div>
			<div class="ess-tabs">
				<button class="ess-tab active" id="tab-guidelines" onclick="essPage.switchTab('guidelines')">
					Appointment Guidelines
				</button>
				<button class="ess-tab" id="tab-policies" onclick="essPage.switchTab('policies')">
					Company Policies
				</button>
			</div>
			<div id="ess-tab-content">
				<div class="ess-loading">Loading...</div>
			</div>
		`;
	}

	load_data() {
		Promise.all([
			frappe.call({ method: 'tripod_hr.tripod_hr.page.ess_guidelines.ess_guidelines.get_guidelines' }),
			frappe.call({ method: 'tripod_hr.tripod_hr.page.ess_guidelines.ess_guidelines.get_policies' })
		]).then(([g, p]) => {
			this.guidelines = (g && g.message) ? g.message : [];
			this.policies   = (p && p.message) ? p.message : [];
			this.renderTab();
		}).catch(() => {
			this.guidelines = [];
			this.policies   = [];
			this.renderTab();
		});
	}

	switchTab(tab) {
		this.activeTab = tab;
		this.openViewer = null;
		this.openPolicy = null;
		document.getElementById('tab-guidelines').classList.toggle('active', tab === 'guidelines');
		document.getElementById('tab-policies').classList.toggle('active', tab === 'policies');
		this.renderTab();
	}

	renderTab() {
		if (this.activeTab === 'guidelines') this.renderGuidelines();
		else this.renderPolicies();
	}

	/* ── GUIDELINES TAB ─────────────────────────── */
	renderGuidelines() {
		const content = document.getElementById('ess-tab-content');

		const rows = this.guidelines.length
			? this.guidelines.map((g, i) => {
				const ext  = this.getExt(g.guideline_file);
				const meta = [g.department, g.effective_date, this.fileSize()].filter(Boolean).join(' · ');
				return `
					<div class="ess-file-row">
						<div class="ess-file-icon ${ext === 'PDF' ? 'pdf' : ext === 'DOC' ? 'doc' : ''}">${ext}</div>
						<div class="ess-file-main">
							<div class="ess-file-name">${frappe.utils.escape_html(g.title)}</div>
							<div class="ess-file-meta">${frappe.utils.escape_html(meta)}</div>
						</div>
						<div style="display:flex;align-items:center;gap:8px">
							<span class="ess-badge ${g.status === 'Active' ? 'ess-badge-green' : 'ess-badge-gray'}">${g.status || 'Active'}</span>
							${g.guideline_file
								? `<button class="ess-view-btn" onclick="essPage.viewFile('${g.guideline_file}','${frappe.utils.escape_html(g.title)}',${i})">View file</button>`
								: `<span style="font-size:11px;color:#9ca3af">No file attached</span>`}
						</div>
					</div>
					<div id="viewer-${i}" style="display:none;padding:0 18px 14px"></div>
				`;
			}).join('')
			: `<div class="ess-empty">No appointment guidelines found. HR will add files here.</div>`;

		content.innerHTML = `
			<div class="ess-section-hd">
				<span class="ess-section-label">Appointment Guidelines</span>
				<div class="ess-section-line"></div>
			</div>
			<div class="ess-panel">
				<div class="ess-panel-hd">
					<div class="ess-panel-title">
						<svg width="15" height="15" viewBox="0 0 15 15" fill="none">
							<rect x="1" y="3.5" width="13" height="10" rx="1.5" fill="#dbeafe" stroke="#3b82f6" stroke-width=".9"/>
							<path d="M1 6.5h13" stroke="#3b82f6" stroke-width=".9"/>
							<rect x="4" y="1" width="4" height="3" rx="1" fill="#dbeafe" stroke="#3b82f6" stroke-width=".9"/>
						</svg>
						Secure document folder
					</div>
					<span class="ess-badge ess-badge-blue">${this.guidelines.length} file${this.guidelines.length !== 1 ? 's' : ''}</span>
				</div>
				${rows}
				<div class="ess-lock-note">
					<svg width="12" height="12" viewBox="0 0 12 12" fill="none">
						<rect x="2" y="5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
						<path d="M4 5V3.5a2 2 0 014 0V5" stroke="currentColor" stroke-width="1.2"/>
					</svg>
					In-browser view only. Right-click, print and save are disabled. Contact HR for a copy.
				</div>
			</div>
		`;
	}

	viewFile(fileUrl, title, idx) {
		// Close if same viewer already open
		const slot = document.getElementById(`viewer-${idx}`);
		if (slot.style.display !== 'none') {
			slot.style.display = 'none';
			slot.innerHTML = '';
			return;
		}
		// Close any other open viewer
		document.querySelectorAll('[id^="viewer-"]').forEach(el => {
			el.style.display = 'none';
			el.innerHTML = '';
		});

		// Build Google Docs viewer URL (works for xlsx, pdf, docx)
		const absoluteUrl = window.location.origin + fileUrl;
		const viewerUrl   = `https://docs.google.com/viewer?url=${encodeURIComponent(absoluteUrl)}&embedded=true`;

		slot.style.display = 'block';
		slot.innerHTML = `
			<div class="ess-viewer">
				<div class="ess-viewer-hd">
					<span class="ess-viewer-title">${frappe.utils.escape_html(title)}</span>
					<div style="display:flex;align-items:center;gap:8px">
						<span class="ess-readonly-badge">
							<svg width="10" height="10" viewBox="0 0 12 12" fill="none">
								<rect x="2" y="5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
								<path d="M4 5V3.5a2 2 0 014 0V5" stroke="currentColor" stroke-width="1.2"/>
							</svg>
							Read-only
						</span>
						<button class="ess-close-btn" onclick="document.getElementById('viewer-${idx}').style.display='none'">Close</button>
					</div>
				</div>
				<div class="ess-viewer-body">
					<iframe
						src="${viewerUrl}"
						oncontextmenu="return false"
						sandbox="allow-scripts allow-same-origin allow-forms"
					></iframe>
				</div>
			</div>
		`;
		slot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
	}

	/* ── POLICIES TAB ───────────────────────────── */
	renderPolicies() {
		const content = document.getElementById('ess-tab-content');

		// Group by department
		const depts = {};
		this.policies.forEach(p => {
			const d = p.department || 'General';
			if (!depts[d]) depts[d] = [];
			depts[d].push(p);
		});

		const deptKeys = Object.keys(depts).sort();

		const deptOptions = deptKeys.map(d => `<option value="${d}">${d}</option>`).join('');

		const deptSections = deptKeys.map(dept => `
			<div class="ess-dept-section" data-dept="${dept}">
				<div class="ess-dept-label">${dept}</div>
				<div class="ess-policy-grid">
					${depts[dept].map(p => `
						<div class="ess-policy-card" onclick="essPage.viewPolicy('${p.name}')">
							<div class="ess-policy-name">${frappe.utils.escape_html(p.policy_name)}</div>
							<div class="ess-policy-meta">
								${p.last_reviewed ? 'Updated ' + p.last_reviewed : ''}
								&nbsp;
								<span class="ess-badge ${p.status === 'Active' ? 'ess-badge-green' : 'ess-badge-amber'}">
									${p.status || 'Active'}
								</span>
							</div>
						</div>
					`).join('')}
				</div>
			</div>
		`).join('') || `<div class="ess-empty">No policies found. HR will add policies here.</div>`;

		content.innerHTML = `
			<div class="ess-search-bar">
				<input class="ess-search-input" type="text" placeholder="Search policies..." oninput="essPage.filterPolicies(this.value)">
				<select class="ess-dept-select" onchange="essPage.filterDept(this.value)">
					<option value="">All departments</option>
					${deptOptions}
				</select>
			</div>
			<div id="policy-viewer-slot"></div>
			<div class="ess-panel" id="policies-panel">
				<div class="ess-panel-hd">
					<div class="ess-panel-title">
						<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
							<rect x="2" y="1" width="10" height="12" rx="1.5" fill="#d1fae5" stroke="#059669" stroke-width=".9"/>
							<path d="M4.5 5h5M4.5 7.5h5M4.5 10h3" stroke="#059669" stroke-width=".9" stroke-linecap="round"/>
						</svg>
						Company policies
					</div>
					<span class="ess-badge ess-badge-green">${this.policies.length} policies · ${deptKeys.length} departments</span>
				</div>
				${deptSections}
				<div class="ess-lock-note">
					<svg width="12" height="12" viewBox="0 0 12 12" fill="none">
						<rect x="2" y="5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
						<path d="M4 5V3.5a2 2 0 014 0V5" stroke="currentColor" stroke-width="1.2"/>
					</svg>
					All policy documents are read-only. Contact HR to suggest revisions.
				</div>
			</div>
		`;
	}

	viewPolicy(name) {
		const policy = this.policies.find(p => p.name === name);
		if (!policy) return;

		const slot = document.getElementById('policy-viewer-slot');

		// Toggle off if same
		if (slot.dataset.open === name) {
			slot.innerHTML = '';
			slot.dataset.open = '';
			return;
		}
		slot.dataset.open = name;

		const fileSection = policy.policy_document
			? `<div style="margin-top:14px;padding-top:14px;border-top:1px solid #f3f4f6">
				<div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px">Policy Document</div>
				<div style="display:flex;align-items:center;gap:10px">
					<div style="width:32px;height:36px;border-radius:5px;background:#fef2f2;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#991b1b">${this.getExt(policy.policy_document)}</div>
					<div style="flex:1;font-size:12px;color:#374151">${policy.policy_document.split('/').pop()}</div>
					<button class="ess-view-btn" onclick="essPage.viewPolicyFile('${policy.policy_document}','${frappe.utils.escape_html(policy.policy_name)}')">View document</button>
				</div>
				<div id="policy-file-viewer-slot"></div>
			</div>`
			: `<div style="margin-top:12px;font-size:11px;color:#9ca3af">No document attached yet.</div>`;

		slot.innerHTML = `
			<div class="ess-policy-viewer">
				<div class="ess-policy-viewer-hd">
					<div style="font-size:13px;font-weight:600;color:#1a1a2e">
						${frappe.utils.escape_html(policy.policy_name)}
						<span style="font-size:11px;font-weight:400;color:#9ca3af;margin-left:6px">${policy.department || ''}</span>
					</div>
					<button class="ess-close-btn" onclick="document.getElementById('policy-viewer-slot').innerHTML='';document.getElementById('policy-viewer-slot').dataset.open=''">Close</button>
				</div>
				<div class="ess-policy-viewer-body">
					<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 12px;margin-bottom:14px;font-size:11px;color:#92400e;display:flex;align-items:center;gap:6px">
						<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M4 5V3.5a2 2 0 014 0V5" stroke="currentColor" stroke-width="1.2"/></svg>
						Policy document — view only. Last reviewed: ${policy.last_reviewed || 'N/A'} · Version ${policy.version || '1.0'}
					</div>
					${policy.summary
						? `<div>${policy.summary}</div>`
						: `
						<h4>1. Purpose</h4>
						<p>This policy defines the rules, responsibilities, and procedures related to <em>${frappe.utils.escape_html(policy.policy_name)}</em> for all Tripod MENA employees.</p>
						<h4>2. Scope</h4>
						<p>Applies to all full-time, part-time, and contracted staff. Third-party vendors must comply where indicated.</p>
						<h4>3. Policy Statement</h4>
						<p>Tripod MENA is committed to fair, transparent, and compliant processes. Non-compliance may result in disciplinary action.</p>
						<h4>4. Review Cycle</h4>
						<p>Reviewed annually. Next review: ${policy.next_review_date || 'Q1 2027'}.</p>
					`}
					${fileSection}
				</div>
			</div>
		`;
		slot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
	}

	viewPolicyFile(fileUrl, title) {
		const slot = document.getElementById('policy-file-viewer-slot');
		if (!slot) return;
		if (slot.dataset.open === fileUrl) {
			slot.innerHTML = '';
			slot.dataset.open = '';
			return;
		}
		slot.dataset.open = fileUrl;
		const absoluteUrl = window.location.origin + fileUrl;
		const viewerUrl   = `https://docs.google.com/viewer?url=${encodeURIComponent(absoluteUrl)}&embedded=true`;
		slot.innerHTML = `
			<div class="ess-viewer" style="margin-top:10px">
				<div class="ess-viewer-hd">
					<span class="ess-viewer-title">${frappe.utils.escape_html(title)}</span>
					<button class="ess-close-btn" onclick="document.getElementById('policy-file-viewer-slot').innerHTML='';document.getElementById('policy-file-viewer-slot').dataset.open=''">Close</button>
				</div>
				<div class="ess-viewer-body">
					<iframe src="${viewerUrl}" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
				</div>
			</div>
		`;
	}

	filterPolicies(q) {
		q = q.toLowerCase();
		document.querySelectorAll('.ess-policy-card').forEach(c => {
			const name = c.querySelector('.ess-policy-name').textContent.toLowerCase();
			c.style.display = name.includes(q) ? '' : 'none';
		});
	}

	filterDept(dept) {
		document.querySelectorAll('.ess-dept-section').forEach(s => {
			s.style.display = (!dept || s.dataset.dept === dept) ? '' : 'none';
		});
	}

	getExt(url) {
		if (!url) return 'FILE';
		const ext = url.split('.').pop().toUpperCase();
		if (['XLS','XLSX'].includes(ext)) return 'XLS';
		if (ext === 'PDF') return 'PDF';
		if (['DOC','DOCX'].includes(ext)) return 'DOC';
		return ext.substring(0, 4);
	}

	fileSize() { return ''; }
}

// Global reference so onclick handlers work
var essPage;
frappe.pages['ess-guidelines'].on_page_load = function(wrapper) {
	var page = frappe.ui.make_app_page({
		parent: wrapper,
		title: 'ESS Guidelines & Policies',
		single_column: true
	});

	document.addEventListener('contextmenu', function(e) {
		if (e.target.closest && e.target.closest('.ess-viewer-body')) e.preventDefault();
	});
	document.addEventListener('keydown', function(e) {
		if ((e.ctrlKey || e.metaKey) && ['s','p','u'].includes(e.key.toLowerCase())) {
			if (document.querySelector('.ess-viewer-body:hover')) e.preventDefault();
		}
	});

	$(page.body).append('<div id="ess-guidelines-root"></div>');
	essPage = new ESSGuidelinesPage(page);
};
</script>
