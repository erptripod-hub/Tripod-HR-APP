<div class="frappe-control" data-page="appraisal-dashboard">
	<div class="page-content">
		<div class="container">
			<div id="dashboard-stats" style="margin-bottom: 30px;"></div>
			<div id="dashboard-filters" style="margin-bottom: 20px;"></div>
			<div id="dashboard-content"></div>
		</div>
	</div>
</div>

<script>
frappe.pages['appraisal-dashboard'].on_page_load = function(wrapper) {
	var page = frappe.ui.make_app_page({
		parent: wrapper,
		title: 'Appraisal Dashboard',
		single_column: true
	});
	
	frappe.appraisal_dashboard = new AppraisalDashboard(page);
}

class AppraisalDashboard {
	constructor(page) {
		this.page = page;
		this.make();
	}
	
	make() {
		this.load_data();
	}
	
	load_data() {
		frappe.call({
			method: 'tripod_hr.tripod_hr.page.appraisal_dashboard.appraisal_dashboard.get_dashboard_data',
			callback: (r) => {
				if (r.message) {
					this.render_stats(r.message.stats);
					this.render_content(r.message.departments, r.message.employees);
				} else {
					this.render_empty();
				}
			}
		});
	}
	
	render_stats(stats) {
		const html = `
			<div class="row">
				<div class="col-sm-3">
					<div class="panel panel-default" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
						<div class="panel-body text-center">
							<h5 style="color: white; opacity: 0.9;">Total Appraisals</h5>
							<h2 style="color: white; margin: 10px 0;">${stats.total || 0}</h2>
						</div>
					</div>
				</div>
				<div class="col-sm-3">
					<div class="panel panel-default" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white;">
						<div class="panel-body text-center">
							<h5 style="color: white; opacity: 0.9;">Pending</h5>
							<h2 style="color: white; margin: 10px 0;">${stats.pending || 0}</h2>
						</div>
					</div>
				</div>
				<div class="col-sm-3">
					<div class="panel panel-default" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white;">
						<div class="panel-body text-center">
							<h5 style="color: white; opacity: 0.9;">Completed</h5>
							<h2 style="color: white; margin: 10px 0;">${stats.completed || 0}</h2>
						</div>
					</div>
				</div>
				<div class="col-sm-3">
					<div class="panel panel-default" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white;">
						<div class="panel-body text-center">
							<h5 style="color: white; opacity: 0.9;">Avg Rating</h5>
							<h2 style="color: white; margin: 10px 0;">${stats.avg_rating ? stats.avg_rating.toFixed(1) : '0.0'}</h2>
						</div>
					</div>
				</div>
			</div>
		`;
		$('#dashboard-stats').html(html);
	}
	
	render_content(departments, employees) {
		if (!departments || departments.length === 0) {
			this.render_empty();
			return;
		}
		
		let html = '<div class="dashboard-departments">';
		
		departments.forEach(dept => {
			html += `
				<div class="panel panel-default" style="margin-bottom: 20px;">
					<div class="panel-heading" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
						<h4 class="panel-title" style="color: white;">
							📁 ${dept.name} 
							<span class="pull-right" style="font-size: 14px;">
								Total: ${dept.total} | Completed: ${dept.completed} | Avg: ${dept.avg_rating.toFixed(1)}
							</span>
						</h4>
					</div>
					<div class="panel-body" style="padding: 0;">
						<table class="table table-bordered" style="margin: 0;">
							<thead>
								<tr>
									<th>Employee</th>
									<th>Cycle</th>
									<th>Rating</th>
									<th>Status</th>
									<th>Action</th>
								</tr>
							</thead>
							<tbody>
			`;
			
			dept.employees.forEach(emp => {
				const statusLabel = emp.docstatus === 1 ? 
					'<span class="label label-success">Completed</span>' : 
					'<span class="label label-warning">Pending</span>';
				const rating = emp.overall_rating ? emp.overall_rating.toFixed(1) : '-';
				
				html += `
					<tr>
						<td><strong>${emp.employee_name}</strong></td>
						<td>${emp.appraisal_cycle || '-'}</td>
						<td>${rating}</td>
						<td>${statusLabel}</td>
						<td>
							<button class="btn btn-xs btn-primary" 
								onclick="frappe.set_route('Form', 'Performance Appraisal Form', '${emp.name}')">
								View
							</button>
						</td>
					</tr>
				`;
			});
			
			html += `
							</tbody>
						</table>
					</div>
				</div>
			`;
		});
		
		html += '</div>';
		$('#dashboard-content').html(html);
	}
	
	render_empty() {
		const html = `
			<div class="panel panel-default">
				<div class="panel-body text-center text-muted" style="padding: 60px 20px;">
					<h4>No Appraisals Found</h4>
					<p>Create your first performance appraisal to get started!</p>
					<button class="btn btn-primary btn-sm" 
						onclick="frappe.new_doc('Performance Appraisal Form')">
						Create New Appraisal
					</button>
				</div>
			</div>
		`;
		$('#dashboard-content').html(html);
	}
}
</script>
